[colors]
;background = ${xrdb:color0:#222}
background = #222
background-alt = #444
foreground = #ED4E59
foreground-alt = #a048fe
primary = #ED4E59
secondary = #ED4E59
alert = #bd2c40

[bar/main]
width = 100%
height = 30
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1
line-color = #f00

border-size = 0
border-color = #00000000

module-margin-left = 1
module-margin-right = 2

font-0 = Nova Mono:size=15
font-1 = Font Awesome 5 Free Regular:size=10
font-2 = Font Awesome 5 Free Solid:size=10
font-3 = Font Awesome 5 Brands:size=10
font-4 = siji:pixelsize=9;1

modules-left = i3
modules-center = spotify
modules-right = xkeyboard alsa date

wm-restack = i3

#scroll-up = i3wm-wsnext
#scroll-down = i3wm-wsprev

cursor-click = pointe
cursor-scroll = ns-resize

tray-position = right
tray-padding = 1
tray-scale = 1.05

tray-offset-x = 0
tray-offset-y = -1
tray-maxsize = 14

enable-ipc = true

[module/spotify]
type = custom/script
interval = 3
format-prefix = " "
format = <label>
format-foreground = ${colors.foreground-alt}
exec = python ~/.config/polybar/scripts/spotify.py --trunclen 90

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = " "
format-prefix-foreground = ${colors.foreground-alt}

label-layout = %layout%

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.secondary}
label-indicator-underline = ${colors.secondary}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8;
ws-icon-8 = 9;

ws-icon-default = ♟

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.background}

; focused = Active workspace on focused monitor
label-focused = %icon% %index%
label-focused-foreground = ${colors.foreground-alt}
label-focused-background = ${colors.background}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %icon% %index%
label-unfocused-padding = 2


[module/wireguard]
type = custom/script
exec = /usr/bin/python ~/.config/polybar/scripts/wireguard.py

; Will the script output continous content?
; Default: false
tail = true
interval = 3
click-left = /usr/bin/python ~/.config/polybar/scripts/wireguard.py click

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.foreground-alt}
label =  %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix-foreground = ${colors.foreground-alt}

label =  %percentage_used%%

[module/wlan]
type = internal/network
interface = wlp10s0f3u4
interval = 3.0

format-connected = <ramp-signal> <label-connected>
format-connected-underline = #9f78e1
label-connected = %essid%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 
ramp-signal-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface = enp8s0
interval = 3.0

format-connected-underline = #55aa55
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = %local_ip%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

[module/date]
type = internal/date
interval = 5

date =
date-alt = " %Y-%m-%d"

time = %H:%M
time-alt = %H:%M:%S

format-prefix-foreground = ${colors.foreground-alt}

label =  %date% %time%

[module/alsa]
type = internal/alsa

label-volume =  %percentage%%
label-volume-foreground = ${root.foreground}

format-muted-prefix = " "
label-muted =  mute

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #55aa55
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = true
bar-volume-indicator = |
bar-volume-indicator-font = 1
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
