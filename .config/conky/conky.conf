conky.config = {
    alignment = 'middle_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'gray',
    default_outline_color = 'white',
    default_shade_color = 'white',
    color1 = '#ED4E59',
    color2 = '#a048fe',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'JetBrainsMono Nerd Font:size=8',
    gap_x = 30,
    gap_y = 30,
    minimum_height = 250,
    minimum_width = 400,
    maximum_width = 400,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_type = 'override',
    own_window_hints ='undecorated,sticky,skip_taskbar,skip_pager,below',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 3.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,

}

conky.text = [[
${color2}${font ConkySymbols:size=20}t${font} ${voffset -10}Arch Linux» $hr ${color}

${color1}${goto 35}OS     : ${color}${execi 86400 cat `ls -atr /etc/*-release | tail -2` | grep "PRETTY_NAME" | cut -d= -f2 |  sed 's/"//g'}
${color1}${goto 35}Kernel : ${color}$kernel on $machine
${color1}${goto 35}Total package : ${color}${exec pacman -Q | wc -l}
${color1}${goto 35}Upgrades package : ${color}${exec pacman -Qu | wc -l}

${color2}${font ConkySymbols:size=16}f${font} ${voffset -10} System» $hr${color}

${color1}${goto 35}Cores  : ${color}${freq_g}GHz ${alignr}${cpu}% ${cpubar 4,100}

${color1}${goto 35}Core 1 : ${color}${freq_g 1}GHz ${alignr}${cpu cpu0}% ${cpubar cpu0 4,100}
${color1}${goto 35}Core 2 : ${color}${freq_g 2}GHz ${alignr}${cpu cpu1}% ${cpubar cpu1 4,100}
${color1}${goto 35}Core 3 : ${color}${freq_g 3}GHz ${alignr}${cpu cpu2}% ${cpubar cpu2 4,100}
${color1}${goto 35}Core 4 : ${color}${freq_g 4}GHz ${alignr}${cpu cpu3}% ${cpubar cpu3 4,100}
${color1}${goto 35}Core 5 : ${color}${freq_g 5}GHz ${alignr}${cpu cpu4}% ${cpubar cpu4 4,100}
${color1}${goto 35}Core 6 : ${color}${freq_g 6}GHz ${alignr}${cpu cpu5}% ${cpubar cpu5 4,100}

${color1}${goto 35}Uptime : ${color}$uptime_short ${alignr}${color1}Load  : ${color}${loadavg}

${color2}${font ConkySymbols:size=16}J${font} ${voffset -10}Memory» $hr${color}

${color1}${goto 35}RAM   : ${color}$mem/$memmax ${alignr}$memperc% ${membar 4,100}
${color1}${goto 35}SWAP : ${color}$swap/$swapmax $alignr}$swapperc% ${swapbar 4,100}


${color2}${font ConkySymbols:size=16}n${font} ${voffset -10} Processes» $hr${color}

${color1}${goto 35}CPU usage ${alignr}Memory Usage${color}
${color1}${goto 35}${stippled_hr}${color}
${goto 35}${top name 1} ${color}${top cpu 1}% ${alignr}${top_mem name 1}${top_mem mem_res 1}
${goto 35}${top name 2} ${color}${top cpu 2}% ${alignr}${top_mem name 2}${top_mem mem_res 2}
${goto 35}${top name 3} ${color}${top cpu 3}% ${alignr}${top_mem name 3}${top_mem mem_res 3}
${goto 35}${top name 4} ${color}${top cpu 4}% ${alignr}${top_mem name 4}${top_mem mem_res 4}
${goto 35}${top name 5} ${color}${top cpu 5}% ${alignr}${top_mem name 5}${top_mem mem_res 5}

${color1}${goto 35}Processes: ${color}$processes ${color1}Running: ${color}$running_processes


${color2}${font ConkySymbols:size=16}k${font} ${voffset -10} Storage» $hr${color}

${color1}${goto 35}ROOT : ${color}${fs_used /}/${fs_size /} ${alignr}${fs_used_perc /}% ${fs_bar 4,100 /}
${color1}${goto 35}HOME : ${color}${fs_used /home/dizbati}/${fs_size /home/dizbati} ${alignr}${fs_used_perc /home/dizbati}% ${fs_bar 4,100 /home/dizbati}
${goto 35}


${color2}${font ConkySymbols:size=16}b${font} ${voffset -10} Internet» $hr${color}

${color1}${goto 35}TCP Conn Count  : ${color}${tcp_portmon 1 65535 count}
${color1}${goto 35}Total Down/Up    : ${color}${totaldown enp1s0f0u8}/${totalup enp1s0f0u8} 
${color1}${goto 35}Speed Down/Up   : ${color}${downspeed enp1s0f0u8}/${upspeed enp1s0f0u8}

${if_running spotify}
    ${color2}${goto 0}${font Font Awesome 5 Brands:size=18}${font} ${voffset -10} Spotify» $hr${color}
    

    ${color1}${goto 140}Title     : ${color}${exec ~/.config/conky/scripts/spotify/title.sh}
    ${color1}${goto 140}Artist   : ${color}${exec ~/.config/conky/scripts/spotify/artist.sh}
    ${color1}${goto 140}Album  : ${color}${exec ~/.config/conky/scripts/spotify/album.sh}

    ${exec ~/.config/conky/scripts/spotify/cover.sh}
    ${image ~/.config/conky/scripts/spotify/current/current.jpg -p 5, 1047 -s 114x114 -f 3}
    ${image ~/.config/conky/scripts/spotify/background.png}
${endif}



]]
